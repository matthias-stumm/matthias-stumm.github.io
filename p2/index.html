<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & Social Media Preview -->
    <title>Matthias Stumm | Marketing & Sales | EuroBOS GmbH</title>
    <meta name="description" content="Matthias Stumm - Marketing & Sales bei EuroBOS GmbH.">
    <meta property="og:title" content="Matthias Stumm | EuroBOS">
    <meta property="og:description" content="Marketing & Sales - Kontakt direkt speichern.">
    <meta property="og:image" content="https://www.eurobos.de/images/logo_eurobos.png">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --eurobos-dark: #002B54;
            --eurobos-blue: #0055A4;
            --eurobos-gold: #C5A059;
            --eurobos-accent: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }
        .hero-gradient {
            background: linear-gradient(135deg, var(--eurobos-dark) 0%, var(--eurobos-blue) 100%);
        }
        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(0, 43, 84, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 43, 84, 0.15);
        }
        .btn-primary {
            background-color: var(--eurobos-blue);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:active {
            transform: scale(0.97);
            background-color: var(--eurobos-dark);
        }
        #qrcode img {
            margin: 0 auto;
            padding: 12px;
            background: white;
            border-radius: 16px;
            border: 1px solid var(--eurobos-accent);
        }
        .profile-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background-color: #f1f5f9;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <!-- Header Branding -->
    <header class="hero-gradient h-36 md:h-44 relative overflow-hidden shrink-0">
        <div class="absolute inset-0 flex items-center justify-center opacity-10">
            <span class="text-white font-black text-7xl tracking-tighter italic select-none">EuroBOS</span>
        </div>
        <svg class="absolute bottom-0 w-full" viewBox="0 24 150 28" preserveAspectRatio="none">
            <path d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" fill="#f8fafc" />
        </svg>
    </header>

    <!-- Main Content -->
    <main class="max-w-md mx-auto px-4 -mt-20 relative z-20 w-full flex-grow pb-12">
        <div class="glass-card rounded-[2.5rem] p-8 fade-in">
            
            <!-- Profile Image (Pfad: profil.jpeg) -->
            <div class="relative -mt-20 mb-6 flex justify-center">
                <img src="profil.jpeg" alt="Matthias Stumm" class="profile-img rounded-full">
            </div>
            
            <!-- Professional Identity -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-1">Matthias Stumm</h1>
                <p class="text-blue-700 font-bold tracking-[0.05em] text-sm italic">Marketing & Sales</p>
                <div class="mt-4 flex justify-center">
                    <span class="h-1 w-12 bg-blue-100 rounded-full"></span>
                </div>
            </div>

            <!-- Contact & Company Section -->
            <div class="space-y-3 mb-8">
                <!-- EuroBOS Branding Box -->
                <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                    <p class="font-bold text-slate-800 text-xl tracking-tight">EuroBOS GmbH</p>
                </div>

                <!-- Action Links -->
                <div class="grid grid-cols-1 gap-2">
                    <a href="tel:+49261921637333" class="group flex items-center gap-4 p-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all">
                        <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"/></svg>
                        </div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tight">Zentrale Koblenz</p>
                            <p class="text-sm font-semibold text-slate-800">0261-9216373-33</p>
                        </div>
                    </a>

                    <a href="tel:+491716244472" class="group flex items-center gap-4 p-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all">
                        <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="2" stroke-linecap="round"/></svg>
                        </div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tight">Mobil Direktleitung</p>
                            <p class="text-sm font-semibold text-slate-800">0171-62 444 72</p>
                        </div>
                    </a>

                    <a href="mailto:M.Stumm@EuroBOS.de" class="group flex items-center gap-4 p-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all">
                        <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 012 2v-7a2 2 0 00-2-2H5a2 2 0 00-2 2v7a2 2 0 012-2z" stroke-width="2"/></svg>
                        </div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tight">E-Mail Kontakt</p>
                            <p class="text-sm font-semibold text-slate-800">M.Stumm@EuroBOS.de</p>
                        </div>
                    </a>

                    <a href="https://www.EuroBOS.de" target="_blank" class="group flex items-center gap-4 p-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all">
                        <div class="bg-blue-50 text-blue-600 p-2.5 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9-9c1.657 0 3 4.03 3 9s-1.343 9-3 9m0-18c-1.657 0-3 4.03-3 9s1.343 9 3 9m-9-9h18"/></svg>
                        </div>
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 uppercase font-bold tracking-tight">Webseite</p>
                            <p class="text-sm font-semibold text-slate-800">www.EuroBOS.de</p>
                        </div>
                    </a>
                </div>
            </div>

            <!-- QR Code Section -->
            <div class="mb-10 text-center">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-4 tracking-[0.4em]">Visitenkarte</p>
                <div id="qrcode" class="inline-block transition-transform hover:scale-105 duration-300"></div>
            </div>

            <!-- Primary Action -->
            <button onclick="downloadVCard()" class="btn-primary w-full text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-600/30 flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Kontakt jetzt speichern
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center pb-4">
            <p class="text-slate-400 text-[10px] tracking-[0.25em] uppercase font-semibold">
                Matthias Stumm &bull; EuroBOS GmbH
            </p>
        </div>
    </main>

    <script>
        const getVCardString = () => {
            return [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "PRODID:-//EuroBOS GmbH//Matthias Stumm//DE",
                "N:Stumm;Matthias;;;",
                "FN:Matthias Stumm",
                "ORG:EuroBOS GmbH",
                "TITLE:Marketing & Sales",
                "TEL;TYPE=WORK,VOICE:+49261921637333",
                "TEL;TYPE=CELL,VOICE:+491716244472",
                "EMAIL;TYPE=INTERNET,WORK:M.Stumm@EuroBOS.de",
                "ADR;TYPE=WORK:;;Zaunheimer Str. 7a;Koblenz;;56072;Germany",
                "URL:https://www.EuroBOS.de",
                "REV:" + new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + "Z",
                "END:VCARD"
            ].join("\r\n");
        };

        window.onload = function() {
            try {
                new QRCode(document.getElementById("qrcode"), {
                    text: getVCardString(),
                    width: 160,
                    height: 160,
                    colorDark : "#002B54",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            } catch (err) {
                console.error("QR-Fehler:", err);
            }
        };

        function downloadVCard() {
            const vcardData = getVCardString();
            const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Matthias_Stumm_EuroBOS.vcf');
            document.body.appendChild(link);
            link.click();
            setTimeout(() => {
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            }, 100);
        }
    </script>
</body>
</html>
