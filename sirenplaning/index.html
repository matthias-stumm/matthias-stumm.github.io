<meta charset="UTF-8">
 
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 
 <title>
  EuroBOS Schallsimulation
 </title>
 <!-- Leaflet CSS für die Karte -->
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
 <style>
  /* Sicherheits-Reset gegen Webbuilder-Verschiebungen */
        * { box-sizing: border-box; }
        :root {
            --eb-blue: #004a99;
            --eb-dark: #002d5d;
            --white: #ffffff;
            --panel-bg: #f8fafc;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: transparent;
        }
        /* Hauptcontainer - Kapselung gegen Header-Verschiebung */
        .main-wrapper {
            display: flex;
            width: 100%;
            height: 700px; 
            max-height: 95vh;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden !important; 
            position: relative; 
            background: var(--white);
            z-index: 1; /* Hält das Widget im eigenen Kontext */
        }
        /* --- Sidebar --- */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }
        .sidebar-header {
            background-color: var(--eb-dark) !important;
            padding: 15px;
            text-align: center;
        }
        .sidebar-header h2 {
            margin: 0 !important;
            padding: 0 !important;
            font-size: 13px !important; 
            letter-spacing: 0.5px !important;
            line-height: 1.3 !important;
            font-weight: 700 !important;
            color: #ffffff !important; /* Weiß erzwungen */
            text-transform: none !important; /* EuroBOS Schreibweise */
        }
        .sidebar-content {
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .section-title {
            font-weight: 800;
            font-size: 11px;
            margin: 15px 0 8px 0;
            color: var(--eb-dark);
            text-transform: uppercase;
            border-bottom: 2px solid var(--eb-blue);
            padding-bottom: 3px;
        }
        /* --- Power Selector --- */
        .power-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 15px;
        }
        .power-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            color: var(--eb-dark);
        }
        .power-btn:hover { border-color: var(--eb-blue); }
        .power-btn.active {
            background: var(--eb-blue) !important;
            color: white !important;
            border-color: var(--eb-blue) !important;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .color-key {
            width: 30px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        /* --- Kartenbereich --- */
        #map {
            flex-grow: 1;
            height: 100%;
            position: relative;
            z-index: 1;
        }
        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
        }
        .btn {
            background: white;
            border: 1px solid #94a3b8;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: var(--eb-dark);
        }
        .btn-primary { background: var(--eb-blue); color: white; border: none; }
        /* Grafik-Ebene für den Schallteppich */
        #heatmapCanvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 500; /* Muss über die Karte (200), aber unter die Marker (600+) */
            opacity: 0.8;
            background: transparent;
        }
        .cta-box {
            margin-top: 20px;
            padding: 12px;
            background: #eef2f7;
            border-radius: 6px;
            border-left: 4px solid var(--eb-blue);
        }
        .cta-box h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--eb-blue); }
        .cta-box p { font-size: 11px; margin: 0 0 8px 0; line-height: 1.4; color: #334155; }
        .cta-link { font-size: 11px; font-weight: 700; color: var(--eb-blue); text-decoration: none; display: block; }
        /* Mobil-Optimierungen */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; height: auto; max-height: none; }
            .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #cbd5e1; }
            #map { height: 450px; min-height: 450px; }
            .sidebar-content { max-height: 250px; }
        }
 </style>
 <div class="main-wrapper">
  <aside class="sidebar">
   <div class="sidebar-header">
    <h2>
     EuroBOS Simulation
     <br>
     für Vorführzwecke
    </h2>
   </div>
   <div class="sidebar-content">
    <div class="section-title">
     1. Leistung wählen (Watt)
    </div>
    <div class="power-selector" id="powerSelector">
     <button class="power-btn" data-watts="600">
      600 W
     </button>
     <button class="power-btn" data-watts="900">
      900 W
     </button>
     <button class="power-btn active" data-watts="1200">
      1200 W
     </button>
     <button class="power-btn" data-watts="1800">
      1800 W
     </button>
     <button class="power-btn" data-watts="2400">
      2400 W
     </button>
     <button class="power-btn" data-watts="3000">
      3000 W
     </button>
    </div>
    <div class="section-title">
     2. Schallpegel dB(A)
    </div>
    <div id="legend">
    </div>
    <div class="cta-box">
     <h4>
      Experten-Analyse
     </h4>
     <p>
      Jetzt rechnerische Planung bei EuroBOS anfragen:
     </p>
     <a href="mailto:Info@EuroBOS.de?subject=Anfrage%20Schallsimulationsberechnung" class="cta-link">
      Info@EuroBOS.de
     </a>
    </div>
    <p style="font-size: 10px; color: #64748b; margin-top: 15px; font-style: italic;">
     Status:
     <span id="simStatus" style="color: green; font-weight: bold;">
      Bereit
     </span>
    </p>
   </div>
  </aside>
  <main id="map">
   <canvas id="heatmapCanvas">
   </canvas>
   <div class="map-controls">
    <button class="btn" onclick="resetSim()">
     Neu planen
    </button>
    <button class="btn btn-primary" onclick="loadDemo()">
     Demo Koblenz
    </button>
   </div>
  </main>
 </div>
 <!-- Leaflet JS -->
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
 </script>
 <script>
  const colorTable = [
        { min: 120, color: [38, 38, 38], label: '> 120 dB(A)' },
        { min: 110, color: [230, 0, 230], label: '110 - 120 dB(A)' },
        { min: 100, color: [0, 0, 255], label: '100 - 110 dB(A)' },
        { min: 90,  color: [0, 255, 255], label: '90 - 100 dB(A)' },
        { min: 85,  color: [0, 128, 0], label: '85 - 90 dB(A)' },
        { min: 80,  color: [153, 255, 153], label: '80 - 85 dB(A)' },
        { min: 75,  color: [255, 255, 0], label: '75 - 80 dB(A)' },
        { min: 70,  color: [255, 153, 51], label: '70 - 75 dB(A)' },
        { min: 65,  color: [255, 0, 0], label: '65 - 70 dB(A)' }
    ];
    const legendEl = document.getElementById('legend');
    colorTable.forEach(item => {
        const div = document.createElement('div');
        div.className = 'legend-item';
        div.innerHTML = `<div class="color-key" style="background: rgb(${item.color.join(',')})"></div><span>${item.label}</span>`;
        legendEl.appendChild(div);
    });
    let map, canvas, ctx, sirens = [], selectedWatts = 1200, isRendering = false;
    function initApp() {
        if (map) return;
        map = L.map('map', { zoomControl: false, tap: false }).setView([50.3567, 7.5939], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        L.control.zoom({ position: 'topright' }).addTo(map);
        canvas = document.getElementById('heatmapCanvas');
        ctx = canvas.getContext('2d');
        map.on('moveend resize', syncCanvas);
        map.on('movestart', () => ctx.clearRect(0,0,canvas.width,canvas.height));
        map.on('click', (e) => addSiren(e.latlng, selectedWatts));
        setTimeout(() => { map.invalidateSize(); syncCanvas(); }, 1000);
    }
    document.querySelectorAll('.power-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.power-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedWatts = parseInt(btn.dataset.watts);
        });
    });
    function syncCanvas() {
        if(!map || !canvas) return;
        const rect = document.getElementById('map').getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        renderSimulation();
    }
    function addSiren(latlng, watts) {
        const lw = 10 * Math.log10(watts) + 104;
        const siren = { latlng: latlng, power: lw, watts: watts };
        sirens.push(siren);
        L.circleMarker(latlng, { radius: 7, fillColor: "#000", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1 })
         .bindTooltip(`Sirene ${sirens.length} (${watts}W)`, { permanent: true, direction: 'top', offset: [0, -5] })
         .addTo(map);
        renderSimulation();
    }
    function resetSim() {
        sirens = [];
        map.eachLayer((layer) => { if (layer instanceof L.CircleMarker) map.removeLayer(layer); });
        ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    function loadDemo() {
        resetSim();
        addSiren(L.latLng(50.364, 7.615), 2400); 
        addSiren(L.latLng(50.356, 7.594), 1200); 
        addSiren(L.latLng(50.345, 7.585), 1800); 
        map.setView([50.3567, 7.5939], 14);
        setTimeout(renderSimulation, 400);
    }
    function getDBAtPixel(px, py, metersPerPixel) {
        let totalIntensity = 0;
        for (let s of sirens) {
            const sPos = map.latLngToContainerPoint(s.latlng);
            const dx = px - sPos.x;
            const dy = py - sPos.y;
            const distPx = Math.sqrt(dx*dx + dy*dy);
            const distM = distPx * metersPerPixel;
            if (distM > 1800) continue;
            if (distM < 3) {
                totalIntensity += Math.pow(10, s.power / 10);
            } else {
                const angle = Math.atan2(dy, dx);
                const noise = (Math.sin(angle * 12) * 6) + (Math.cos(angle * 8) * 4);
                const level = s.power - 21 * Math.log10(distM + noise) - 10;
                if (level > 0) totalIntensity += Math.pow(10, level / 10);
            }
        }
        return totalIntensity > 0 ? 10 * Math.log10(totalIntensity) : 0;
    }
    function renderSimulation() {
        if (!sirens.length || isRendering || !map || !ctx) return;
        isRendering = true;
        document.getElementById('simStatus').innerText = "Rechne...";
        const zoom = map.getZoom();
        const metersPerPixel = 40075016.686 * Math.abs(Math.cos(map.getCenter().lat * Math.PI/180)) / Math.pow(2, zoom + 8);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const step = (zoom > 15 || window.innerWidth > 768) ? 4 : 8;
        const w = canvas.width;
        const h = canvas.height;
        requestAnimationFrame(() => {
            for (let x = 0; x < w; x += step) {
                for (let y = 0; y < h; y += step) {
                    const db = getDBAtPixel(x, y, metersPerPixel);
                    if (db < 65) continue;
                    let color = null;
                    for (let item of colorTable) {
                        if (db >= item.min) { color = item.color; break; }
                    }
                    if (color) {
                        ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.8)`;
                        ctx.fillRect(x, y, step, step);
                    }
                }
            }
            isRendering = false;
            document.getElementById('simStatus').innerText = "Bereit";
        });
    }
    setTimeout(initApp, 1000);
 </script>
