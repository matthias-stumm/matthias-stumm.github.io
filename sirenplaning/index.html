<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EuroBOS Schallsimulation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; }

    :root {
      --eb-blue: #004a99;
      --eb-dark: #002d5d;
      --white: #ffffff;
      --panel-bg: #f8fafc;
      --line: #cbd5e1;
      --muted: #64748b;
      --text: #1e293b;
      --success: #15803d;
      --warning: #b45309;
      --danger: #b91c1c;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: transparent;
    }

    .pin-screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #eef2f7;
    }

    .pin-card {
      width: min(360px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      box-shadow: 0 16px 40px rgba(0, 45, 93, 0.14);
      overflow: hidden;
    }

    .pin-card-header {
      padding: 16px;
      background: var(--eb-dark);
      color: var(--white);
      text-align: center;
    }

    .pin-card-header h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .pin-card-body {
      padding: 18px;
    }

    .pin-label {
      display: block;
      margin-bottom: 8px;
      color: var(--eb-dark);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pin-row {
      display: flex;
      gap: 8px;
    }

    .pin-input {
      min-width: 0;
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: var(--text);
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 4px;
      padding: 10px;
      text-align: center;
      outline: none;
    }

    .pin-input:focus {
      border-color: var(--eb-blue);
      box-shadow: 0 0 0 2px rgba(0, 74, 153, 0.12);
    }

    .pin-submit {
      min-width: 86px;
      border: 1px solid var(--eb-blue);
      border-radius: 4px;
      background: var(--eb-blue);
      color: var(--white);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .pin-error {
      min-height: 17px;
      margin: 9px 0 0 0;
      color: var(--danger);
      font-size: 11px;
      font-weight: 700;
    }

    .main-wrapper.locked {
      display: none;
    }

    .main-wrapper {
      display: flex;
      width: 100%;
      height: 700px;
      max-height: 95vh;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden !important;
      position: relative;
      background: var(--white);
      z-index: 1;
    }

    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--panel-bg);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .sidebar-header {
      background-color: var(--eb-dark) !important;
      padding: 15px;
      text-align: center;
    }

    .sidebar-header h2 {
      margin: 0 !important;
      padding: 0 !important;
      font-size: 13px !important;
      letter-spacing: 0.5px !important;
      line-height: 1.3 !important;
      font-weight: 700 !important;
      color: #ffffff !important;
      text-transform: none !important;
    }

    .sidebar-content {
      padding: 15px;
      flex-grow: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .section-title {
      font-weight: 800;
      font-size: 11px;
      margin: 15px 0 8px 0;
      color: var(--eb-dark);
      text-transform: uppercase;
      border-bottom: 2px solid var(--eb-blue);
      padding-bottom: 3px;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .search-form {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .search-input {
      min-width: 0;
      flex: 1;
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--white);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
      padding: 10px 9px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--eb-blue);
      box-shadow: 0 0 0 2px rgba(0, 74, 153, 0.12);
    }

    .icon-btn {
      width: 42px;
      min-width: 42px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--eb-blue);
      border-radius: 4px;
      background: var(--eb-blue);
      color: var(--white);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .icon-btn:hover {
      background: var(--eb-dark);
      border-color: var(--eb-dark);
    }

    .icon-btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .search-status {
      min-height: 16px;
      margin: 0 0 8px 0;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--muted);
    }

    .search-status.loading { color: var(--warning); }
    .search-status.error { color: var(--danger); }
    .search-status.ready { color: var(--success); }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .result-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--white);
      padding: 8px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .result-btn:hover,
    .result-btn.active {
      border-color: var(--eb-blue);
      box-shadow: 0 0 0 2px rgba(0, 74, 153, 0.08);
    }

    .result-name {
      display: block;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.25;
      color: var(--eb-dark);
    }

    .result-detail {
      display: block;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--muted);
    }

    .preview-box {
      display: none;
      margin: 10px 0 14px 0;
      padding: 10px;
      background: #eef6ff;
      border: 1px solid rgba(0, 74, 153, 0.24);
      border-left: 4px solid var(--eb-blue);
      border-radius: 6px;
    }

    .preview-box.active {
      display: block;
    }

    .preview-title {
      margin: 0;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.3;
      color: var(--eb-dark);
    }

    .preview-meta {
      margin: 4px 0 8px 0;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--muted);
    }

    .preview-actions {
      display: flex;
      gap: 6px;
    }

    .small-btn {
      flex: 1;
      min-height: 34px;
      border: 1px solid #94a3b8;
      border-radius: 4px;
      background: var(--white);
      color: var(--eb-dark);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .small-btn.primary {
      border-color: var(--eb-blue);
      background: var(--eb-blue);
      color: var(--white);
    }

    .power-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 15px;
    }

    .power-btn {
      background: white;
      border: 1px solid var(--line);
      padding: 10px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      color: var(--eb-dark);
    }

    .power-btn:hover { border-color: var(--eb-blue); }

    .power-btn.active {
      background: var(--eb-blue) !important;
      color: white !important;
      border-color: var(--eb-blue) !important;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .color-key {
      width: 30px;
      height: 16px;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    #map {
      flex-grow: 1;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .map-controls {
      position: absolute;
      bottom: 20px;
      left: 10px;
      right: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      z-index: 1000;
    }

    .btn {
      background: white;
      border: 1px solid #94a3b8;
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      color: var(--eb-dark);
    }

    .btn-primary {
      background: var(--eb-blue);
      color: white;
      border: none;
    }

    #heatmapCanvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 500;
      opacity: 0.8;
      background: transparent;
    }

    .preview-marker {
      filter: drop-shadow(0 3px 8px rgba(0, 45, 93, 0.32));
    }

    .preview-pin {
      position: relative;
      width: 24px;
      height: 24px;
      border: 3px solid #ffffff;
      border-radius: 50% 50% 50% 0;
      background: var(--eb-blue);
      transform: rotate(-45deg);
      box-shadow: 0 0 0 2px var(--eb-dark);
    }

    .preview-pin::after {
      content: "";
      position: absolute;
      top: 6px;
      left: 6px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffffff;
    }

    .cta-box {
      margin-top: 20px;
      padding: 12px;
      background: #eef2f7;
      border-radius: 6px;
      border-left: 4px solid var(--eb-blue);
    }

    .cta-box h4 {
      margin: 0 0 5px 0;
      font-size: 12px;
      color: var(--eb-blue);
    }

    .cta-box p {
      font-size: 11px;
      margin: 0 0 8px 0;
      line-height: 1.4;
      color: #334155;
    }

    .cta-link {
      font-size: 11px;
      font-weight: 700;
      color: var(--eb-blue);
      text-decoration: none;
      display: block;
    }

    .system-note {
      font-size: 10px;
      color: var(--muted);
      margin-top: 15px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .main-wrapper {
        flex-direction: column;
        height: auto;
        max-height: none;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      #map {
        height: 450px;
        min-height: 450px;
      }

      .sidebar-content {
        max-height: 330px;
      }
    }
  </style>
</head>
<body>
  <section class="pin-screen" id="pinScreen">
    <div class="pin-card">
      <div class="pin-card-header">
        <h1>EuroBOS Simulation<br>geschützter Zugriff</h1>
      </div>
      <form class="pin-card-body" id="pinForm">
        <label class="pin-label" for="pinInput">PIN eingeben</label>
        <div class="pin-row">
          <input class="pin-input" id="pinInput" type="password" inputmode="numeric" autocomplete="off" maxlength="8" aria-label="PIN eingeben">
          <button class="pin-submit" type="submit">Öffnen</button>
        </div>
        <p class="pin-error" id="pinError" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <div class="main-wrapper locked" id="appShell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>EuroBOS Simulation<br>für Vorführzwecke</h2>
      </div>
      <div class="sidebar-content">
        <div class="section-title">1. Standort suchen</div>
        <form class="search-form" id="searchForm">
          <input
            class="search-input"
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="PLZ, Ort, Straße, Gebäude"
            aria-label="Standort suchen"
          >
          <button class="icon-btn" id="searchButton" type="submit" title="Standort suchen" aria-label="Standort suchen">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>
        </form>
        <p class="search-status" id="searchStatus">Suchbegriff eingeben und Treffer auswählen.</p>
        <div class="search-results" id="searchResults" aria-live="polite"></div>
        <div class="preview-box" id="previewBox">
          <p class="preview-title" id="previewTitle"></p>
          <p class="preview-meta" id="previewMeta"></p>
          <div class="preview-actions">
            <button class="small-btn primary" id="placePreviewButton" type="button">Sirene hier platzieren</button>
            <button class="small-btn" id="clearPreviewButton" type="button">Verwerfen</button>
          </div>
        </div>

        <div class="section-title">2. Leistung wählen (Watt)</div>
        <div class="power-selector" id="powerSelector">
          <button class="power-btn" data-watts="600" type="button">600 W</button>
          <button class="power-btn" data-watts="900" type="button">900 W</button>
          <button class="power-btn active" data-watts="1200" type="button">1200 W</button>
          <button class="power-btn" data-watts="1800" type="button">1800 W</button>
          <button class="power-btn" data-watts="2400" type="button">2400 W</button>
          <button class="power-btn" data-watts="3000" type="button">3000 W</button>
        </div>

        <div class="section-title">3. Schallpegel dB(A)</div>
        <div id="legend"></div>

        <div class="cta-box">
          <h4>Experten-Analyse</h4>
          <p>Jetzt rechnerische Planung bei EuroBOS anfragen:</p>
          <a href="mailto:Info@EuroBOS.de?subject=Anfrage%20Schallsimulationsberechnung" class="cta-link">Info@EuroBOS.de</a>
        </div>

        <p class="system-note">
          Status:
          <span id="simStatus" style="color: green; font-weight: bold;">Bereit</span>
        </p>
      </div>
    </aside>

    <main id="map">
      <canvas id="heatmapCanvas"></canvas>
      <div class="map-controls">
        <button class="btn" onclick="resetSim()" type="button">Neu planen</button>
        <button class="btn" onclick="deleteLastSiren()" type="button">Letzte Sirene löschen</button>
        <button class="btn btn-primary" onclick="loadDemo()" type="button">Demo Koblenz</button>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const colorTable = [
      { min: 120, color: [38, 38, 38], label: "> 120 dB(A)" },
      { min: 110, color: [230, 0, 230], label: "110 - 120 dB(A)" },
      { min: 100, color: [0, 0, 255], label: "100 - 110 dB(A)" },
      { min: 90, color: [0, 255, 255], label: "90 - 100 dB(A)" },
      { min: 85, color: [0, 128, 0], label: "85 - 90 dB(A)" },
      { min: 80, color: [153, 255, 153], label: "80 - 85 dB(A)" },
      { min: 75, color: [255, 255, 0], label: "75 - 80 dB(A)" },
      { min: 70, color: [255, 153, 51], label: "70 - 75 dB(A)" },
      { min: 65, color: [255, 0, 0], label: "65 - 70 dB(A)" }
    ];

    const legendEl = document.getElementById("legend");
    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const searchStatus = document.getElementById("searchStatus");
    const searchResults = document.getElementById("searchResults");
    const previewBox = document.getElementById("previewBox");
    const previewTitle = document.getElementById("previewTitle");
    const previewMeta = document.getElementById("previewMeta");
    const placePreviewButton = document.getElementById("placePreviewButton");
    const clearPreviewButton = document.getElementById("clearPreviewButton");
    const mapControls = document.querySelector(".map-controls");
    const appShell = document.getElementById("appShell");
    const pinScreen = document.getElementById("pinScreen");
    const pinForm = document.getElementById("pinForm");
    const pinInput = document.getElementById("pinInput");
    const pinError = document.getElementById("pinError");

    const requiredPin = "4711";
    let map;
    let canvas;
    let ctx;
    let sirens = [];
    let selectedWatts = 1200;
    let isRendering = false;
    let previewMarker = null;
    let selectedPreview = null;
    let lastSearchStartedAt = 0;
    let pendingSearchTimer = null;
    let activeSearchController = null;

    const previewIcon = L.divIcon({
      className: "preview-marker",
      html: '<div class="preview-pin"></div>',
      iconSize: [30, 30],
      iconAnchor: [15, 28]
    });

    colorTable.forEach((item) => {
      const div = document.createElement("div");
      div.className = "legend-item";
      div.innerHTML = `<div class="color-key" style="background: rgb(${item.color.join(",")})"></div><span>${item.label}</span>`;
      legendEl.appendChild(div);
    });

    function initApp() {
      if (map) return;

      map = L.map("map", { zoomControl: false, tap: false }).setView([50.3567, 7.5939], 14);
      L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: "abcd",
        maxZoom: 20
      }).addTo(map);
      L.control.zoom({ position: "topright" }).addTo(map);

      L.DomEvent.disableClickPropagation(mapControls);
      L.DomEvent.disableScrollPropagation(mapControls);

      canvas = document.getElementById("heatmapCanvas");
      ctx = canvas.getContext("2d");

      map.on("moveend resize", syncCanvas);
      map.on("movestart", () => ctx.clearRect(0, 0, canvas.width, canvas.height));
      map.on("click", (e) => addSiren(e.latlng, selectedWatts));

      setTimeout(() => {
        map.invalidateSize();
        syncCanvas();
      }, 500);
    }

    document.querySelectorAll(".power-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".power-btn").forEach((button) => button.classList.remove("active"));
        btn.classList.add("active");
        selectedWatts = parseInt(btn.dataset.watts, 10);

        if (selectedPreview) {
          updatePreviewPanel(selectedPreview);
        }
      });
    });

    searchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      queueSearch(searchInput.value);
    });

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim();

      if (query.length === 0) {
        setSearchStatus("Suchbegriff eingeben und Treffer auswählen.");
        clearResults();
        clearSearchPreview();
        return;
      }

      if (query.length < 3) {
        setSearchStatus("Bitte mindestens 3 Zeichen eingeben.");
        clearResults();
        return;
      }

      queueSearch(query);
    });

    placePreviewButton.addEventListener("click", () => {
      if (!selectedPreview) return;
      addSiren(L.latLng(selectedPreview.lat, selectedPreview.lon), selectedWatts);
      clearSearchPreview();
      setSearchStatus("Sirene wurde am Suchtreffer platziert.", "ready");
    });

    clearPreviewButton.addEventListener("click", () => {
      clearSearchPreview();
      setSearchStatus("Vorschau verworfen. Treffer erneut auswählen oder neue Suche starten.");
    });

    pinForm.addEventListener("submit", (event) => {
      event.preventDefault();
      unlockApp(pinInput.value);
    });

    function unlockApp(pinValue) {
      if (pinValue.trim() !== requiredPin) {
        pinError.textContent = "PIN ist nicht korrekt.";
        pinInput.value = "";
        pinInput.focus();
        return;
      }

      sessionStorage.setItem("eurobosPinOk", "true");
      pinScreen.style.display = "none";
      appShell.classList.remove("locked");
      pinError.textContent = "";
      initApp();
    }

    function bootApp() {
      if (sessionStorage.getItem("eurobosPinOk") === "true") {
        pinScreen.style.display = "none";
        appShell.classList.remove("locked");
        initApp();
        return;
      }

      appShell.classList.add("locked");
      pinScreen.style.display = "flex";
      pinInput.focus();
    }

    function queueSearch(rawQuery) {
      const query = rawQuery.trim();

      window.clearTimeout(pendingSearchTimer);

      if (query.length < 3) {
        setSearchStatus("Bitte mindestens 3 Zeichen eingeben.");
        clearResults();
        return;
      }

      const now = Date.now();
      const delay = Math.max(0, 1000 - (now - lastSearchStartedAt));
      pendingSearchTimer = window.setTimeout(() => performSearch(query), delay);
    }

    async function performSearch(query) {
      if (activeSearchController) {
        activeSearchController.abort();
      }

      activeSearchController = new AbortController();
      lastSearchStartedAt = Date.now();
      setSearchStatus("Suche...", "loading");
      searchButton.disabled = true;

      const params = new URLSearchParams({
        format: "jsonv2",
        addressdetails: "1",
        limit: "5",
        countrycodes: "de",
        q: query
      });

      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`, {
          signal: activeSearchController.signal,
          headers: { "Accept": "application/json" }
        });

        if (!response.ok) {
          throw new Error(`Suche fehlgeschlagen (${response.status})`);
        }

        const results = await response.json();
        renderSearchResults(results);
      } catch (error) {
        if (error.name !== "AbortError") {
          clearResults();
          setSearchStatus("Suche momentan nicht verfügbar. Bitte später erneut versuchen.", "error");
        }
      } finally {
        searchButton.disabled = false;
      }
    }

    function renderSearchResults(results) {
      clearResults();

      if (!Array.isArray(results) || results.length === 0) {
        setSearchStatus("Keine Treffer gefunden. Bitte Adresse genauer eingeben.", "error");
        return;
      }

      setSearchStatus(`${results.length} Treffer gefunden. Ergebnis auswählen.`, "ready");

      results.forEach((result, index) => {
        const btn = document.createElement("button");
        btn.className = "result-btn";
        btn.type = "button";
        btn.innerHTML = `
          <span class="result-name">${escapeHtml(getResultTitle(result))}</span>
          <span class="result-detail">${escapeHtml(result.display_name || "Adresse ohne Detailangabe")}</span>
        `;
        btn.addEventListener("click", () => selectSearchResult(result, btn));
        searchResults.appendChild(btn);

        if (index === 0) {
          btn.dataset.first = "true";
        }
      });
    }

    function selectSearchResult(result, button) {
      document.querySelectorAll(".result-btn").forEach((btn) => btn.classList.remove("active"));
      button.classList.add("active");

      const lat = parseFloat(result.lat);
      const lon = parseFloat(result.lon);

      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        setSearchStatus("Der Treffer enthält keine gültige Kartenposition.", "error");
        return;
      }

      selectedPreview = {
        lat,
        lon,
        title: getResultTitle(result),
        detail: result.display_name || "",
        type: result.type || result.class || "Standort"
      };

      const latlng = L.latLng(lat, lon);
      showPreviewMarker(latlng, selectedPreview.title);
      updatePreviewPanel(selectedPreview);
      setSearchStatus("Vorschau gesetzt. Platzierung bitte bestätigen.", "ready");

      const bounds = result.boundingbox;
      if (Array.isArray(bounds) && bounds.length === 4) {
        const south = parseFloat(bounds[0]);
        const north = parseFloat(bounds[1]);
        const west = parseFloat(bounds[2]);
        const east = parseFloat(bounds[3]);

        if ([south, north, west, east].every(Number.isFinite) && south !== north && west !== east) {
          map.fitBounds([[south, west], [north, east]], { maxZoom: 17, padding: [40, 40] });
          return;
        }
      }

      map.setView(latlng, 17);
    }

    function showPreviewMarker(latlng, title) {
      if (previewMarker) {
        map.removeLayer(previewMarker);
      }

      previewMarker = L.marker(latlng, { icon: previewIcon, zIndexOffset: 1000 })
        .bindTooltip(`Vorschau: ${title}`, { permanent: true, direction: "top", offset: [0, -28] })
        .addTo(map);
    }

    function updatePreviewPanel(preview) {
      previewTitle.textContent = preview.title;
      previewMeta.textContent = `${preview.detail} | ${selectedWatts} W werden beim Bestätigen platziert.`;
      previewBox.classList.add("active");
    }

    function clearSearchPreview() {
      selectedPreview = null;
      previewBox.classList.remove("active");
      previewTitle.textContent = "";
      previewMeta.textContent = "";

      if (previewMarker) {
        map.removeLayer(previewMarker);
        previewMarker = null;
      }

      document.querySelectorAll(".result-btn").forEach((btn) => btn.classList.remove("active"));
    }

    function clearSearchState() {
      searchInput.value = "";
      clearResults();
      clearSearchPreview();
      setSearchStatus("Suchbegriff eingeben und Treffer auswählen.");
    }

    function clearResults() {
      searchResults.innerHTML = "";
    }

    function setSearchStatus(message, state) {
      searchStatus.textContent = message;
      searchStatus.className = "search-status";
      if (state) searchStatus.classList.add(state);
    }

    function getResultTitle(result) {
      const address = result.address || {};
      return (
        result.name ||
        address.building ||
        address.amenity ||
        address.school ||
        address.townhall ||
        address.road ||
        address.city ||
        address.town ||
        address.village ||
        result.display_name ||
        "Suchtreffer"
      );
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function syncCanvas() {
      if (!map || !canvas) return;
      const rect = document.getElementById("map").getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      renderSimulation();
    }

    function addSiren(latlng, watts) {
      const lw = 10 * Math.log10(watts) + 104;

      const marker = L.circleMarker(latlng, {
        radius: 7,
        fillColor: "#000",
        color: "#fff",
        weight: 2,
        opacity: 1,
        fillOpacity: 1
      })
        .bindTooltip(`Sirene ${sirens.length + 1} (${watts}W)`, { permanent: true, direction: "top", offset: [0, -5] })
        .addTo(map);

      const siren = { latlng, power: lw, watts, marker };
      sirens.push(siren);
      renderSimulation();
    }

    function deleteLastSiren() {
      const removedSiren = sirens.pop();

      if (!removedSiren) {
        document.getElementById("simStatus").innerText = "Keine Sirene vorhanden";
        setTimeout(() => {
          document.getElementById("simStatus").innerText = "Bereit";
        }, 1200);
        return;
      }

      if (removedSiren.marker) {
        map.removeLayer(removedSiren.marker);
      } else {
        map.eachLayer((layer) => {
          if (layer instanceof L.CircleMarker) {
            const layerLatLng = layer.getLatLng();
            if (layerLatLng.equals(removedSiren.latlng)) {
              map.removeLayer(layer);
            }
          }
        });
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (sirens.length) {
        renderSimulation();
      } else {
        document.getElementById("simStatus").innerText = "Bereit";
      }
    }

    function resetSim() {
      sirens = [];

      if (map) {
        map.eachLayer((layer) => {
          if (layer instanceof L.CircleMarker) {
            map.removeLayer(layer);
          }
        });
      }

      if (ctx) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      clearSearchState();
    }

    function loadDemo() {
      resetSim();
      addSiren(L.latLng(50.364, 7.615), 2400);
      addSiren(L.latLng(50.356, 7.594), 1200);
      addSiren(L.latLng(50.345, 7.585), 1800);
      map.setView([50.3567, 7.5939], 14);
      setTimeout(renderSimulation, 400);
    }

    function getDBAtPixel(px, py, metersPerPixel) {
      let totalIntensity = 0;

      for (const s of sirens) {
        const sPos = map.latLngToContainerPoint(s.latlng);
        const dx = px - sPos.x;
        const dy = py - sPos.y;
        const distPx = Math.sqrt(dx * dx + dy * dy);
        const distM = distPx * metersPerPixel;

        if (distM > 1800) continue;

        if (distM < 3) {
          totalIntensity += Math.pow(10, s.power / 10);
        } else {
          const angle = Math.atan2(dy, dx);
          const noise = (Math.sin(angle * 12) * 6) + (Math.cos(angle * 8) * 4);
          const level = s.power - 21 * Math.log10(distM + noise) - 10;

          if (level > 0) {
            totalIntensity += Math.pow(10, level / 10);
          }
        }
      }

      return totalIntensity > 0 ? 10 * Math.log10(totalIntensity) : 0;
    }

    function renderSimulation() {
      if (!sirens.length || isRendering || !map || !ctx) return;

      isRendering = true;
      document.getElementById("simStatus").innerText = "Rechne...";

      const zoom = map.getZoom();
      const metersPerPixel = 40075016.686 * Math.abs(Math.cos(map.getCenter().lat * Math.PI / 180)) / Math.pow(2, zoom + 8);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const step = (zoom > 15 || window.innerWidth > 768) ? 4 : 8;
      const w = canvas.width;
      const h = canvas.height;

      requestAnimationFrame(() => {
        for (let x = 0; x < w; x += step) {
          for (let y = 0; y < h; y += step) {
            const db = getDBAtPixel(x, y, metersPerPixel);
            if (db < 65) continue;

            let color = null;
            for (const item of colorTable) {
              if (db >= item.min) {
                color = item.color;
                break;
              }
            }

            if (color) {
              ctx.fillStyle = `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.8)`;
              ctx.fillRect(x, y, step, step);
            }
          }
        }

        isRendering = false;
        document.getElementById("simStatus").innerText = "Bereit";
      });
    }

    bootApp();
  </script>
</body>
</html>
